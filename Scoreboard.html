<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Score Board</title>
  <link rel="stylesheet" href="scoreboard.css">
</head>
<body>
  <div id="main">

    <h1>Score-Board</h1>
    <div class="container">
    
    <!-- Home score section -->
    <div>
      <h2>Home</h2>
      <p id="scoreHome">5</p>
      <button class="btn" onclick="HomeincrementOne()">+1</button>
      <button class="btn" onclick="HomeincrementTwo()">+2</button>
      <button class="btn" onclick="HomeincrementThree()">+3</button>
    </div>

    <div id="quater">
      <button id="timer" class="time">10 : 00</button>
      <h3 class="session"><span class="quatertext">1<sup>st</sup></span><br>Quater</h3>
      <div id="footer">
      <button id="Next-Qtr">Next Quater</button>
      <button id="New-G">New Game</button>
    </div>
    </div>


    <!-- Away score section -->
    <div>
      <h2>Guest</h2>
      <p id="scoreAway">5</p>
      <button class="btn" onclick="AwayincrementOne()">+1</button>
      <button class="btn" onclick="AwayincrementTwo()">+2</button>
      <button class="btn" onclick="AwayincrementThree()">+3</button>
    </div>

    
  </div>

  </div>
  
  <script src="index.js"></script>
</body>
</html>
